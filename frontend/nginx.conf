# ============================================================
# nginx.conf — Configuração do servidor Nginx para o frontend
# SPA React: qualquer rota desconhecida retorna o index.html
# O Nginx também faz proxy das chamadas /api para o backend
# ============================================================

server {
    # Porta padrão do Nginx (mapeada para 5173 no docker-compose)
    listen 80;
    server_name localhost;

    # Diretório raiz onde o Vite gera os arquivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # Configurações de charset e compressão
    charset utf-8;

    # --- Compressão Gzip ---
    # Reduz o tamanho dos arquivos transferidos para o navegador
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;

    # --- Cache de Assets Estáticos ---
    # JS e CSS com hash no nome são imutáveis — cache de 1 ano
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|svg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Proxy da API para o Backend ---
    # Redireciona chamadas /api/* para o container do backend (porta 3001)
    # Isso substitui o proxy do Vite que só funciona em modo dev
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;

        # Cabeçalhos necessários para o Express identificar o cliente real
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para requisições longas (geração de copy pode demorar)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # --- Rota Principal da SPA (React Router fallback) ---
    # Qualquer URL que não corresponda a um arquivo estático real
    # retorna o index.html — o React Router trata o roteamento no cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Página de Erro Personalizada ---
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
