<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon SVG embutido — ícone de escrita para identidade visual -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>"
    />

    <!-- Viewport responsivo padrão -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== SEO Principal ===== -->
    <title>CopyGenerator.ai — Gerador de Copy de Alta Conversão com IA</title>
    <meta
      name="description"
      content="Crie copywriting profissional e roteiros VSL de alta conversão usando inteligência artificial (Gemini) baseados nos frameworks AIDA, PAS, BAB e FAB. Grátis para usar."
    />
    <meta
      name="keywords"
      content="copywriting, gerador de copy, marketing digital, AIDA, PAS, BAB, FAB, VSL, inteligência artificial, gemini, anúncio, landing page"
    />
    <meta name="author" content="Antigravity Dev" />
    <meta name="robots" content="index, follow" />

    <!-- ===== Open Graph (compartilhamento em redes sociais) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CopyGenerator.ai — Copy Profissional com IA" />
    <meta
      property="og:description"
      content="Gere textos persuasivos de alta conversão usando os melhores frameworks de copywriting, com suporte a AIDA, PAS, BAB, FAB e roteiros VSL completos."
    />
    <meta property="og:locale" content="pt_BR" />

    <!-- ===== Google Fonts — Inter (corpo) + Outfit (títulos) ===== -->
    <!-- Pré-conexão para reduzir latência DNS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Raiz da aplicação React -->
    <div id="root"></div>

    <!-- Entry point do Vite — carrega o React de forma modular -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
